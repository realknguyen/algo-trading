name: CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main
      - develop
      - development
      - "feature/**"
      - "feat/**"
      - "fix/**"
      - "codex/**"
      - "claude/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Validate environment
        run: |
          python -m compileall -q src adapters algorithms backtesting order_management risk_management trading_logging config database tests main.py
          python main.py list-strategies
          python main.py backtest --help > /dev/null
          python main.py init-db --database-url sqlite:///./.ci-smoke.db > /dev/null
          rm -f ./.ci-smoke.db
          python main.py paper --help > /dev/null
          python main.py live --help > /dev/null
          python -m pip check

      - name: Run full test suite with coverage
        run: |
          pytest -q \
            --cov=src \
            --cov=adapters \
            --cov=algorithms \
            --cov=backtesting \
            --cov=order_management \
            --cov=risk_management \
            --cov-report=term-missing \
            --cov-report=xml:coverage-${{ matrix.python-version }}.xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage-${{ matrix.python-version }}.xml
          if-no-files-found: error

  required-checks:
    name: required-checks
    runs-on: ubuntu-latest
    needs:
      - test
    if: always()

    steps:
      - name: Enforce required CI gates
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more CI test jobs failed."
            exit 1
          fi

          echo "All required CI gates passed."
